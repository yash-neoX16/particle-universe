
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Gesture Particle Universe</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #video-container { position: absolute; bottom: 10px; right: 10px; width: 150px; border: 2px solid #444; }
        video { width: 100%; transform: scaleX(-1); }
    </style>
</head>
<body>
    <div id="info">
        <h1>Particle Universe</h1>
        <p>🖐️ Open Palm: Expand | ✊ Fist: Contract</p>
        <p>🤏 Pinch: Change Shape | ↔️ Move: Rotate</p>
    </div>
    <div id="video-container"><video id="webcam" autoplay playsinline></video></div>

    <!-- CDNs for Three.js and MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // --- CONFIGURATION ---
        const PARTICLE_COUNT = 5000;
        let currentTemplate = 'sphere';
        let colorHue = 0.5;
        let expansionFactor = 1.0;
        let isPinching = false;

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Particle Geometry
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        
        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
            targetPositions[i] = positions[i];
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ size: 0.05, color: 0x00ffcc, transparent: true, opacity: 0.8 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        // --- PARAMETRIC SHAPES ---
        function setShape(type) {
            currentTemplate = type;
            const posArr = targetPositions;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const t = (i / PARTICLE_COUNT) * Math.PI * 2;
                const u = Math.random() * Math.PI * 2;
                const v = Math.random() * Math.PI;

                if (type === 'heart') {
                    // Heart formula
                    posArr[i3] = 0.15 * (16 * Math.pow(Math.sin(t), 3));
                    posArr[i3 + 1] = 0.15 * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    posArr[i3 + 2] = (Math.random() - 0.5) * 0.5;
                } else if (type === 'flower') {
                    // Rose Curve (k=5)
                    const r = 2 * Math.cos(5 * t);
                    posArr[i3] = r * Math.cos(t);
                    posArr[i3 + 1] = r * Math.sin(t);
                    posArr[i3 + 2] = (Math.random() - 0.5) * 0.5;
                } else if (type === 'saturn') {
                    if (i < PARTICLE_COUNT * 0.4) { // Central sphere
                        posArr[i3] = 0.8 * Math.sin(v) * Math.cos(u);
                        posArr[i3 + 1] = 0.8 * Math.sin(v) * Math.sin(u);
                        posArr[i3 + 2] = 0.8 * Math.cos(v);
                    } else { // Rings
                        const ringR = 1.5 + Math.random() * 0.5;
                        posArr[i3] = ringR * Math.cos(t);
                        posArr[i3 + 1] = (Math.random() - 0.5) * 0.1;
                        posArr[i3 + 2] = ringR * Math.sin(t);
                    }
                } else if (type === 'fireworks') {
                    const speed = Math.random() * 3;
                    posArr[i3] = speed * Math.sin(v) * Math.cos(u);
                    posArr[i3 + 1] = speed * Math.sin(v) * Math.sin(u);
                    posArr[i3 + 2] = speed * Math.cos(v);
                } else { // Default Sphere
                    posArr[i3] = 2 * Math.sin(v) * Math.cos(u);
                    posArr[i3 + 1] = 2 * Math.sin(v) * Math.sin(u);
                    posArr[i3 + 2] = 2 * Math.cos(v);
                }
            }
        }

        const templates = ['sphere', 'heart', 'flower', 'saturn', 'fireworks'];
        let templateIdx = 0;

        // --- MEDIAPIPE LOGIC ---
        const videoElement = document.getElementById('webcam');
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // 1. Gesture: Fist vs Open
                const indexTip = landmarks[8];
                const palmBase = landmarks[0];
                const distToPalm = Math.hypot(indexTip.x - palmBase.x, indexTip.y - palmBase.y);
                expansionFactor = distToPalm > 0.4 ? 1.5 : 0.2; // Open = Expand, Fist = Contract

                // 2. Gesture: Pinch (Thumb 4 + Index 8)
                const thumbTip = landmarks[4];
                const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                if (pinchDist < 0.05 && !isPinching) {
                    isPinching = true;
                    templateIdx = (templateIdx + 1) % templates.length;
                    setShape(templates[templateIdx]);
                } else if (pinchDist > 0.1) {
                    isPinching = false;
                }

                // 3. Control Rotation & Color
                points.rotation.y = (landmarks[9].x - 0.5) * 4;
                points.rotation.x = (landmarks[9].y - 0.5) * 4;
                colorHue = landmarks[9].x; // Horizontal position maps to color
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640, height: 480
        });
        cameraUtils.start();

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                // Lerp current position to target with expansion
                const target = targetPositions[i] * expansionFactor;
                positions[i] += (target - positions[i]) * 0.1;
            }
            geometry.attributes.position.needsUpdate = true;

            // Dynamic Color
            material.color.setHSL(colorHue, 0.8, 0.5);
            
            // Subtle float effect
            points.rotation.z += 0.001;

            renderer.render(scene, camera);
        }

        setShape('sphere');
        animate();

        // Responsive resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
